name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: pxmpkeen/smartbed
  APP_DIR: /opt/smartbed

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stage 1 – Build & push Docker image to Docker Hub
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: meta
        run: |
          SHA_TAG="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.IMAGE_NAME }}:latest"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "tags=${LATEST_TAG},${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 2 – Deploy to remote server via SSH
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true   # fail the step if any command exits non-zero
          script: |
            set -euo pipefail

            APP_DIR="${{ env.APP_DIR }}"

            # ── 1. Ensure application directory exists ──────────────────────
            if [ ! -d "$APP_DIR" ]; then
              echo "ERROR: Application directory '$APP_DIR' does not exist." >&2
              exit 1
            fi
            cd "$APP_DIR"

            # ── 2. Ensure docker-compose.yml is present ─────────────────────
            if [ ! -f "docker-compose.yml" ]; then
              echo "ERROR: docker-compose.yml not found in '$APP_DIR'." >&2
              exit 1
            fi

            # ── 3. Write .env from secrets ──────────────────────────────────
            cat > .env << 'ENVEOF'
            APP_ENV=${{ secrets.APP_ENV }}
            APP_PORT=${{ secrets.APP_PORT }}
            APP_NAME=${{ secrets.APP_NAME }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SSL_MODE=${{ secrets.DB_SSL_MODE }}
            DB_MAX_OPEN_CONNS=${{ secrets.DB_MAX_OPEN_CONNS }}
            DB_MAX_IDLE_CONNS=${{ secrets.DB_MAX_IDLE_CONNS }}
            DB_CONN_MAX_LIFETIME_MINUTES=${{ secrets.DB_CONN_MAX_LIFETIME_MINUTES }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_DB=${{ secrets.REDIS_DB }}
            MQTT_BROKER=${{ secrets.MQTT_BROKER }}
            MQTT_CLIENT_ID=${{ secrets.MQTT_CLIENT_ID }}
            MQTT_USERNAME=${{ secrets.MQTT_USERNAME }}
            MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }}
            MQTT_QOS=${{ secrets.MQTT_QOS }}
            MQTT_ACK_TIMEOUT_SECONDS=${{ secrets.MQTT_ACK_TIMEOUT_SECONDS }}
            JWT_PRIVATE_KEY_PATH=${{ secrets.JWT_PRIVATE_KEY_PATH }}
            JWT_PUBLIC_KEY_PATH=${{ secrets.JWT_PUBLIC_KEY_PATH }}
            JWT_ACCESS_TOKEN_EXPIRY_MINUTES=${{ secrets.JWT_ACCESS_TOKEN_EXPIRY_MINUTES }}
            JWT_REFRESH_TOKEN_EXPIRY_DAYS=${{ secrets.JWT_REFRESH_TOKEN_EXPIRY_DAYS }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL }}
            LOG_PRETTY=${{ secrets.LOG_PRETTY }}
            MIGRATIONS_PATH=${{ secrets.MIGRATIONS_PATH }}
            SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
            SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
            ENVEOF

            # Strip leading whitespace that heredoc indentation can introduce
            sed -i 's/^[[:space:]]*//' .env

            # ── 4. Log in to Docker Hub ─────────────────────────────────────
            echo "${{ secrets.DOCKER_PASSWORD }}" | \
              docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # ── 5. Pull the latest image ────────────────────────────────────
            docker pull ${{ env.IMAGE_NAME }}:latest

            # ── 6. Tear down the current stack ──────────────────────────────
            docker compose down

            # ── 7. Bring the stack back up with the new image ───────────────
            docker compose up -d

            # ── 8. Verify the api service is running ────────────────────────
            sleep 5
            if ! docker compose ps --services --filter "status=running" | grep -q "^api$"; then
              echo "ERROR: 'api' service failed to start." >&2
              docker compose logs api
              exit 1
            fi

            echo "✅ Deployment succeeded."

