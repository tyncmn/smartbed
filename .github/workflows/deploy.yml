name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: pxmpkeen/smartbed
  APP_DIR: /opt/smartbed

jobs:
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Stage 1 вЂ“ Build & push Docker image to Docker Hub
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: meta
        run: |
          SHA_TAG="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.IMAGE_NAME }}:latest"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "tags=${LATEST_TAG},${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Stage 2 вЂ“ Deploy to remote server via SSH
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # в”Ђв”Ђ 1. Prepare the .env file locally from secrets в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate .env file
        run: |
          cat > .env << 'EOF'
          APP_ENV=${{ secrets.APP_ENV }}
          APP_PORT=${{ secrets.APP_PORT }}
          APP_NAME=${{ secrets.APP_NAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSL_MODE=${{ secrets.DB_SSL_MODE }}
          DB_MAX_OPEN_CONNS=${{ secrets.DB_MAX_OPEN_CONNS }}
          DB_MAX_IDLE_CONNS=${{ secrets.DB_MAX_IDLE_CONNS }}
          DB_CONN_MAX_LIFETIME_MINUTES=${{ secrets.DB_CONN_MAX_LIFETIME_MINUTES }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_DB=${{ secrets.REDIS_DB }}
          MQTT_BROKER=${{ secrets.MQTT_BROKER }}
          MQTT_CLIENT_ID=${{ secrets.MQTT_CLIENT_ID }}
          MQTT_USERNAME=${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }}
          MQTT_QOS=${{ secrets.MQTT_QOS }}
          MQTT_ACK_TIMEOUT_SECONDS=${{ secrets.MQTT_ACK_TIMEOUT_SECONDS }}
          JWT_PRIVATE_KEY_PATH=${{ secrets.JWT_PRIVATE_KEY_PATH }}
          JWT_PUBLIC_KEY_PATH=${{ secrets.JWT_PUBLIC_KEY_PATH }}
          JWT_ACCESS_TOKEN_EXPIRY_MINUTES=${{ secrets.JWT_ACCESS_TOKEN_EXPIRY_MINUTES }}
          JWT_REFRESH_TOKEN_EXPIRY_DAYS=${{ secrets.JWT_REFRESH_TOKEN_EXPIRY_DAYS }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          LOG_PRETTY=${{ secrets.LOG_PRETTY }}
          MIGRATIONS_PATH=${{ secrets.MIGRATIONS_PATH }}
          SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
          EOF
          # Strip the leading indentation added by the heredoc above
          sed -i 's/^[[:space:]]*//' .env

      # в”Ђв”Ђ 2. Write JWT key files from secrets в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Write JWT key files
        run: |
          mkdir -p keys
          printf '%s' "${{ secrets.JWT_PRIVATE_KEY }}" > keys/private.pem
          printf '%s' "${{ secrets.JWT_PUBLIC_KEY }}"  > keys/public.pem

      # в”Ђв”Ђ 3. Upload docker-compose.yml, .env, keys, and mosquitto config в”Ђв”Ђв”Ђв”Ђ
      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.yml,.env,keys/private.pem,keys/public.pem,deploy/mosquitto/mosquitto.conf"
          target: ${{ env.APP_DIR }}
          strip_components: 0

      # в”Ђв”Ђ 4. Run the deployment commands on the server в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ env.APP_DIR }}

            # Ensure sub-directories exist
            mkdir -p deploy/mosquitto keys

            # Lock down private key permissions
            chmod 600 keys/private.pem
            chmod 644 keys/public.pem

            # Log in to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | \
              docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Tear down the current stack
            docker compose down

            # Bring the stack back up with the new image
            docker compose up -d

            # Verify the api service is running
            sleep 10
            if ! docker compose ps --services --filter "status=running" | grep -q "^api$"; then
              echo "ERROR: 'api' service failed to start." >&2
              docker compose logs api
              exit 1
            fi

            echo "вњ… Deployment succeeded."

